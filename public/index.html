<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mëso Shqip - Profesionale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0f4f8; }
        .diff-error { color: #f43f5e; font-weight: 800; background: #fff1f2; padding: 2px 4px; border-radius: 4px; }
        .diff-correct { color: #10b981; }
        .premium-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .loading-shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex h-screen items-center justify-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Inline Icons for reliability
        const XIcon = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        );

        const SaveIcon = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        );

        const MailIcon = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        );

        const ExternalLinkIcon = ({ size = 16 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        );

        function App() {
            const [view, setView] = useState('register');
            const [currentUser, setCurrentUser] = useState(null);
            const [customText, setCustomText] = useState('');
            const [isRecording, setIsRecording] = useState(false);
            const [transcript, setTranscript] = useState('');
            const [feedback, setFeedback] = useState(null);
            const [showPayment, setShowPayment] = useState(false);
            const [voices, setVoices] = useState([]);

            // Premium Verification State
            const [premiumStep, setPremiumStep] = useState('email'); // 'email', 'verify'
            const [premiumEmail, setPremiumEmail] = useState('');
            const [premiumCode, setPremiumCode] = useState('');
            const [isVerifying, setIsVerifying] = useState(false);
            const [emailPreviewUrl, setEmailPreviewUrl] = useState('');

            // Admin State
            const [adminEmail, setAdminEmail] = useState('');
            const [adminPass, setAdminPass] = useState('');
            const [usersList, setUsersList] = useState([]);

            useEffect(() => {
                try {
                    const storedUser = localStorage.getItem('mesoshqip_user');
                    if (storedUser) {
                        setCurrentUser(JSON.parse(storedUser));
                        setView('app');
                    }
                } catch (e) {
                    console.error("Error reading localStorage", e);
                }
                
                const loadVoices = () => {
                    const availableVoices = window.speechSynthesis.getVoices();
                    setVoices(availableVoices);
                };
                window.speechSynthesis.onvoiceschanged = loadVoices;
                loadVoices();
            }, []);

            const getBestAlbanianVoice = () => {
                return voices.find(v => (v.lang.startsWith('sq') || v.name.includes('Albanian')) && v.name.includes('Online')) || 
                       voices.find(v => v.lang.startsWith('sq')) || 
                       null;
            };

            const speakText = (text) => {
                if (!currentUser?.isPremium) {
                    setShowPayment(true);
                    return;
                }

                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                const bestVoice = getBestAlbanianVoice();
                if (bestVoice) {
                    utterance.voice = bestVoice;
                }
                utterance.lang = 'sq-AL';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            };

            const startPractice = () => {
                if (!customText) return alert("Shkruaj një fjali ose fjalë për të praktikuar!");
                
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    alert("Browseri juaj nuk e mbështet njohjen e zërit. Përdorni Google Chrome.");
                    return;
                }

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();
                recognition.lang = 'sq-AL';
                recognition.onstart = () => { setIsRecording(true); setTranscript(''); setFeedback(null); };
                recognition.onresult = (e) => {
                    const result = e.results[0][0].transcript;
                    setTranscript(result);
                    compareText(result, customText);
                };
                recognition.onend = () => setIsRecording(false);
                recognition.start();
            };

            const compareText = (spoken, target) => {
                const sWords = spoken.toLowerCase().replace(/[.,!?]/g, '').split(/\s+/);
                const tWords = target.toLowerCase().replace(/[.,!?]/g, '').split(/\s+/);
                
                let html = [];
                let errors = 0;

                tWords.forEach((word, i) => {
                    if (sWords.includes(word)) {
                        html.push(<span key={i} className="diff-correct mr-1">{word}</span>);
                    } else {
                        html.push(<span key={i} className="diff-error mr-1">{word}</span>);
                        errors++;
                    }
                });

                setFeedback({
                    success: errors === 0,
                    message: errors === 0 ? "Shkëlqyeshëm! Shqiptim perfekt. 🌟" : `Keni ${errors} gabime. Provoni përsëri!`,
                    html
                });
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                const name = e.target.name.value;
                try {
                    const res = await fetch('/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name })
                    });
                    const data = await res.json();
                    setCurrentUser(data.user);
                    localStorage.setItem('mesoshqip_user', JSON.stringify(data.user));
                    setView('app');
                } catch (err) {
                    alert("Gabim gjatë regjistrimit!");
                }
            };

            // Step 1: Request Code
            const requestPremiumCode = async (e) => {
                e.preventDefault();
                setIsVerifying(true);
                try {
                    const res = await fetch('/api/premium/request', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: currentUser.id, email: premiumEmail })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setEmailPreviewUrl(data.previewUrl);
                        setPremiumStep('verify');
                    } else {
                        alert(data.error || "Gabim!");
                    }
                } catch (err) {
                    alert("Gabim gjatë kërkesës!");
                } finally {
                    setIsVerifying(false);
                }
            };

            // Step 2: Verify Code
            const verifyPremiumCode = async (e) => {
                e.preventDefault();
                setIsVerifying(true);
                try {
                    const res = await fetch('/api/premium/verify', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: currentUser.id, code: premiumCode })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setCurrentUser(data.user);
                        localStorage.setItem('mesoshqip_user', JSON.stringify(data.user));
                        setShowPayment(false);
                        alert("Suksese! Jeni tani anëtar PREMIUM.");
                    } else {
                        alert(data.error || "Kodi i pasaktë!");
                    }
                } catch (err) {
                    alert("Gabim gjatë verifikimit!");
                } finally {
                    setIsVerifying(false);
                }
            };

            const handleAdminLogin = async (e) => {
                e.preventDefault();
                try {
                    const res = await fetch('/api/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: adminEmail, password: adminPass })
                    });
                    const data = await res.json();
                    if (data.success) {
                        const uRes = await fetch('/api/admin/users', { headers: { 'Authorization': data.token }});
                        setUsersList(await uRes.json());
                        setView('admin');
                    } else alert("Gabim!");
                } catch (err) {
                    alert("Gabim në server!");
                }
            };

            if (view === 'register') {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-900 p-6">
                        <div className="bg-white p-12 rounded-[40px] shadow-2xl w-full max-w-md text-center border-b-8 border-blue-600">
                            <div className="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 text-white text-3xl font-black">SH</div>
                            <h1 className="text-4xl font-black text-slate-800 mb-2">Mëso Shqip</h1>
                            <p className="text-slate-400 mb-8 font-medium">Praktiko shqiptimin me Inteligjencë Artificiale</p>
                            <form onSubmit={handleRegister} className="space-y-4">
                                <input name="name" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-600 text-lg font-bold" placeholder="Emri juaj" required />
                                <button className="w-full bg-blue-600 text-white p-5 rounded-2xl font-black text-xl hover:bg-blue-700 transition-all shadow-xl shadow-blue-600/20">Fillo</button>
                            </form>
                            <button onClick={() => setView('adminLogin')} className="mt-8 text-xs text-slate-300 uppercase tracking-widest font-bold hover:text-slate-500">Admin Access</button>
                        </div>
                    </div>
                );
            }

            if (view === 'adminLogin') {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-900">
                        <div className="bg-slate-800 p-10 rounded-3xl w-full max-w-sm">
                            <h2 className="text-2xl font-black text-white mb-6">Admin Login</h2>
                            <form onSubmit={handleAdminLogin} className="space-y-4">
                                <input placeholder="Email" className="w-full p-4 bg-slate-700 text-white rounded-xl outline-none" value={adminEmail} onChange={e=>setAdminEmail(e.target.value)} />
                                <input type="password" placeholder="Password" className="w-full p-4 bg-slate-700 text-white rounded-xl outline-none" value={adminPass} onChange={e=>setAdminPass(e.target.value)} />
                                <button className="w-full bg-white text-slate-900 font-bold p-4 rounded-xl">Kyçu</button>
                            </form>
                            <button onClick={() => setView('register')} className="mt-4 w-full text-slate-400 font-bold">Kthehu</button>
                        </div>
                    </div>
                );
            }

            if (view === 'admin') {
                return (
                    <div className="min-h-screen bg-slate-50 p-10 font-sans">
                        <div className="max-w-4xl mx-auto">
                            <div className="flex justify-between items-center mb-8">
                                <h1 className="text-3xl font-black">Panel Menaxhimi</h1>
                                <button onClick={() => setView('register')} className="bg-slate-900 text-white px-6 py-2 rounded-xl font-bold">Dil</button>
                            </div>
                            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 text-slate-400 text-xs font-bold uppercase tracking-wider">
                                        <tr><th className="p-6">Përdoruesi</th><th className="p-6">Email</th><th className="p-6">Statusi</th><th className="p-6">Data</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {usersList.map(u => (
                                            <tr key={u.id} className="hover:bg-slate-50">
                                                <td className="p-6 font-bold">{u.name}</td>
                                                <td className="p-6 text-slate-500 text-sm">{u.email || "-"}</td>
                                                <td className="p-6">{u.isPremium ? <span className="text-purple-600 font-black">PREMIUM ⭐</span> : "Free"}</td>
                                                <td className="p-6 text-slate-400 text-sm">{new Date(u.registeredAt).toLocaleDateString()}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-100 p-6 md:p-12 flex flex-col items-center">
                    <div className="max-w-2xl w-full space-y-8">
                        <header className="flex justify-between items-center">
                            <div><h1 className="text-2xl font-black text-slate-800">Mëso Shqip</h1><p className="text-slate-400 text-sm italic">AI-Powered Learning</p></div>
                            <div className="flex items-center gap-4">
                                {currentUser?.isPremium ? <span className="premium-gradient text-white px-4 py-2 rounded-full text-xs font-black shadow-lg">PREMIUM</span> : <button onClick={()=>setShowPayment(true)} className="bg-white text-blue-600 border border-blue-100 px-4 py-2 rounded-full text-xs font-black hover:bg-blue-50">UPGRADE</button>}
                                <button onClick={()=>{localStorage.clear(); window.location.reload();}} className="text-slate-400 hover:text-slate-600">
                                    <XIcon size={20} />
                                </button>
                            </div>
                        </header>

                        <main className="bg-white rounded-[40px] shadow-2xl p-8 md:p-12 space-y-8 relative overflow-hidden">
                            <div>
                                <label className="text-xs font-black text-slate-300 uppercase tracking-widest mb-3 block">Shkruaj fjalinë që dëshiron të mësosh:</label>
                                <textarea 
                                    className="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-blue-500 text-2xl font-bold text-slate-700 min-h-[150px] transition-all"
                                    placeholder="Psh: Mirëmëngjesi, si kaluat sot?"
                                    value={customText}
                                    onChange={e => setCustomText(e.target.value)}
                                />
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <button 
                                    onClick={() => speakText(customText)}
                                    className={`p-6 rounded-3xl font-black flex items-center justify-center gap-3 transition-all ${currentUser?.isPremium ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-600/20 hover:scale-[1.02]' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                                    {currentUser?.isPremium ? 'Dëgjo me AI' : 'Dëgjo me AI (Premium)'}
                                </button>

                                <button 
                                    onClick={startPractice}
                                    disabled={isRecording}
                                    className={`p-6 rounded-3xl font-black flex items-center justify-center gap-3 transition-all shadow-xl ${isRecording ? 'bg-red-500 text-white animate-pulse' : 'bg-blue-600 text-white hover:bg-blue-700 hover:scale-[1.02]'}`}
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>
                                    {isRecording ? 'Po të dëgjoj...' : 'Fillo të flasësh'}
                                </button>
                            </div>

                            {transcript && (
                                <div className="space-y-4">
                                    <div className="p-6 bg-slate-50 rounded-3xl border border-slate-100">
                                        <p className="text-xs font-black text-slate-300 uppercase mb-2">Dëgjuam:</p>
                                        <p className="text-xl font-bold text-slate-600">"{transcript}"</p>
                                    </div>

                                    {feedback && (
                                        <div className={`p-8 rounded-[32px] border-2 ${feedback.success ? 'bg-emerald-50 border-emerald-100' : 'bg-rose-50 border-rose-100'}`}>
                                            <p className={`text-xl font-black mb-4 ${feedback.success ? 'text-emerald-700' : 'text-rose-700'}`}>{feedback.message}</p>
                                            <div className="text-2xl font-bold leading-relaxed">{feedback.html}</div>
                                            {!feedback.success && <p className="text-xs text-rose-400 mt-4 font-bold uppercase tracking-widest">* Fjalët me të kuqe janë gabim</p>}
                                        </div>
                                    )}
                                </div>
                            )}

                            {showPayment && (
                                <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-6 md:p-12 z-50">
                                    <div className="bg-white p-12 md:p-20 rounded-[50px] w-full max-w-2xl text-center shadow-2xl border-t-[12px] border-purple-500 relative transition-all animate-in zoom-in-95 duration-300">
                                        <button onClick={() => setShowPayment(false)} className="absolute top-8 right-8 text-slate-400 hover:text-slate-600 transition-colors"><XIcon size={32}/></button>
                                        
                                        {premiumStep === 'email' ? (
                                            <>
                                                <div className="w-24 h-24 premium-gradient rounded-[32px] flex items-center justify-center mx-auto mb-10 text-white shadow-2xl">
                                                    <MailIcon size={48} />
                                                </div>
                                                <h2 className="text-4xl md:text-5xl font-black mb-6 text-slate-800 tracking-tight">Akses Premium</h2>
                                                <p className="text-slate-500 text-lg md:text-xl mb-12 font-medium leading-relaxed">Shkruaj email-in tënd për të marrë kodin e verifikimit dhe për të hapur të gjitha mundësitë e AI.</p>
                                                <form onSubmit={requestPremiumCode} className="space-y-6">
                                                    <input 
                                                        type="email" 
                                                        placeholder="Email adresa juaj" 
                                                        className="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-purple-500 text-xl font-bold transition-all"
                                                        value={premiumEmail}
                                                        onChange={e => setPremiumEmail(e.target.value)}
                                                        required
                                                    />
                                                    <button 
                                                        type="submit" 
                                                        disabled={isVerifying}
                                                        className="w-full premium-gradient text-white font-black py-6 rounded-3xl text-2xl hover:scale-[1.02] active:scale-95 transition-all shadow-2xl disabled:opacity-50"
                                                    >
                                                        {isVerifying ? 'Duke dërguar...' : 'Dërgo Kodin e Verifikimit'}
                                                    </button>
                                                </form>
                                            </>
                                        ) : (
                                            <>
                                                <div className="w-24 h-24 premium-gradient rounded-[32px] flex items-center justify-center mx-auto mb-10 text-white shadow-2xl">
                                                    <SaveIcon size={48} />
                                                </div>
                                                <h2 className="text-4xl md:text-5xl font-black mb-6 text-slate-800 tracking-tight">Verifiko Email-in</h2>
                                                <p className="text-slate-500 text-lg md:text-xl mb-6 font-medium leading-relaxed">Kemi dërguar kodin e sigurisë në <b>{premiumEmail}</b>.</p>
                                                
                                                {emailPreviewUrl && (
                                                    <a 
                                                        href={emailPreviewUrl} 
                                                        target="_blank" 
                                                        className="inline-flex items-center gap-3 bg-blue-50 text-blue-600 px-6 py-3 rounded-2xl mb-10 text-base font-bold border-2 border-blue-100 hover:bg-blue-100 transition-all shadow-sm"
                                                    >
                                                        <ExternalLinkIcon size={20} /> Shiko kutinë e postës (Demo)
                                                    </a>
                                                )}

                                                <form onSubmit={verifyPremiumCode} className="space-y-6">
                                                    <input 
                                                        type="text" 
                                                        placeholder="000000" 
                                                        className="w-full p-8 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-purple-500 text-center text-5xl font-black tracking-[0.5em] text-purple-600"
                                                        value={premiumCode}
                                                        onChange={e => setPremiumCode(e.target.value)}
                                                        maxLength="6"
                                                        required
                                                    />
                                                    <button 
                                                        type="submit" 
                                                        disabled={isVerifying}
                                                        className="w-full premium-gradient text-white font-black py-6 rounded-3xl text-2xl hover:scale-[1.02] active:scale-95 transition-all shadow-2xl disabled:opacity-50"
                                                    >
                                                        {isVerifying ? 'Duke verifikuar...' : 'Verifiko dhe Aktivizo'}
                                                    </button>
                                                    <button type="button" onClick={() => {setPremiumStep('email'); setEmailPreviewUrl('');}} className="text-slate-400 font-bold text-lg hover:text-slate-600 transition-colors mt-4">Ndrysho Email-in</button>
                                                </form>
                                            </>
                                        )}
                                    </div>
                                </div>
                            )}
                        </main>
                        
                        <footer className="text-center text-slate-300 text-xs font-bold uppercase tracking-[0.2em]">Sistemi i Mësimit Autonom © 2026</footer>
                    </div>
                </div>
            );
        }

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (err) {
            console.error("React render error", err);
            document.getElementById('root').innerHTML = '<div style="color:red; padding:20px;">Gabim gjatë ngarkimit të aplikacionit. Ju lutem kontrolloni internetin ose kontaktoni admin.</div>';
        }
    </script>
</body>
</html>
